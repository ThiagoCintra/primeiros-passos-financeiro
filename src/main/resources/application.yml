spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:alunos_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: financeiro
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always

payment:
  providers:
    default: PIX

alunos:
  service:
    url: ${ALUNOS_SERVICE_URL:http://alunos-service:8080}

app:
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-change-this-secret-12345}
