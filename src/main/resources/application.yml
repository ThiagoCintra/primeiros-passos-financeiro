spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:alunos_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: financeiro
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always

payment:
  providers:
    default: PIX

alunos:
  service:
    url: ${ALUNOS_SERVICE_URL:http://alunos-service:8080}

login:
  service:
    url: ${LOGIN_SERVICE_URL:http://login-service:8080}

session:
  cache:
    ttl-seconds: ${SESSION_CACHE_TTL_SECONDS:30}
    fallback-max-age-seconds: ${SESSION_CACHE_FALLBACK_MAX_AGE_SECONDS:300}

rate-limit:
  pagamentos:
    limit: ${PAGAMENTOS_RATE_LIMIT:5}
    window-seconds: ${PAGAMENTOS_RATE_LIMIT_WINDOW_SECONDS:60}

antifraude:
  valor-alto-limite: ${ANTIFRAUDE_VALOR_ALTO_LIMITE:5000}
  max-tentativas: ${ANTIFRAUDE_MAX_TENTATIVAS:3}
  janela-tentativas-minutos: ${ANTIFRAUDE_JANELA_TENTATIVAS_MINUTOS:10}
  janela-duplicidade-minutos: ${ANTIFRAUDE_JANELA_DUPLICIDADE_MINUTOS:5}

app:
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-change-this-secret-12345}
